name: Stress Test — 100 Players (Cloud Runner)

on:
  workflow_dispatch:
    inputs:
      playerCount:
        description: 'Number of human players'
        required: true
        default: '76'
      botCount:
        description: 'Number of bot players'
        required: true
        default: '24'
      rounds:
        description: 'Total rounds'
        required: true
        default: '5'

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Install backend dependencies
        working-directory: games/bakery-bash/backend
        run: npm ci

      - name: Install functions dependencies
        working-directory: games/bakery-bash/backend/functions
        run: npm ci

      - name: Run stress test
        working-directory: games/bakery-bash/backend
        run: |
          set -o pipefail
          export PLAYER_COUNT=${{ github.event.inputs.playerCount }}
          export BOT_COUNT=${{ github.event.inputs.botCount }}
          export TOTAL_ROUNDS=${{ github.event.inputs.rounds }}
          npx firebase emulators:exec --only auth,firestore,functions \
            --project bakery-bash-54d12 \
            "node scripts/test-100-players-realistic.js" \
            2>&1 | tee stress-test-output.log
        env:
          CI: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: games/bakery-bash/backend/stress-test-output.log
